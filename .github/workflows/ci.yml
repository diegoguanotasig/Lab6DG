permissions: 
  contents: read

name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
 build:
   runs-on: self-hosted
   
   steps:
      - name: Checkout
        uses: actions/checkout@v4

#- name: Set up Python
      - name: Show Python
        run: python3 --version 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

 test:
    runs-on: self-hosted

    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q --cov=prediction_pipeline_demo --cov-report=term-missing --cov-fail-under=70
     
# Paso 3 Agregar ML pipeline en CI
      - name: Run ML demo pipeline
        run: python prediction_pipeline_demo.py
# Paso 4 Configurar self-hosted runner
        
      # TODO: Add a step here to run the demo pipeline end-to-end
      # The goal is to execute prediction_pipeline_demo.py so CI logs show the model’s R^2 score.
